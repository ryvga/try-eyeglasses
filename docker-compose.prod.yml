services:
  web:
    env_file:
      - /etc/tryeyeglasses/app.env

  proxy:
    image: nginx:1.27-alpine
    container_name: tryeyeglasses-proxy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/tryeyeglasses/tls:/etc/nginx/tls:ro
