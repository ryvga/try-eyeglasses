services:
  web:
    build: .
    container_name: tryeyeglasses-web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - tryeyeglasses-data:/app/data
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  tryeyeglasses-data:
