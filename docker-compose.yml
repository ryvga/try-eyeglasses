services:
  web:
    build: .
    container_name: tryeyeglasses-web
    restart: unless-stopped
    volumes:
      - tryeyeglasses-data:/app/data
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  tryeyeglasses-data:
